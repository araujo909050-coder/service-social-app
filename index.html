<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instatrampo | Comunidade de Serviços</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <!-- Header -->
    <header class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic">Instatrampo</h1>
            <div id="user-status" class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-bold uppercase">Beta</div>
        </div>
    </header>

    <!-- Filtros de Nicho -->
    <div class="max-w-lg mx-auto p-4 flex gap-2 overflow-x-auto no-scrollbar">
        <button onclick="filtrar('Todos')" class="bg-blue-600 text-white px-4 py-1 rounded-full text-sm shrink-0">Todos</button>
        <button onclick="filtrar('Design')" class="bg-white border px-4 py-1 rounded-full text-sm shrink-0 text-gray-600">Design</button>
        <button onclick="filtrar('Fotografia')" class="bg-white border px-4 py-1 rounded-full text-sm shrink-0 text-gray-600">Fotografia</button>
        <button onclick="filtrar('Obras')" class="bg-white border px-4 py-1 rounded-full text-sm shrink-0 text-gray-600">Obras</button>
        <button onclick="filtrar('Eventos')" class="bg-white border px-4 py-1 rounded-full text-sm shrink-0 text-gray-600">Eventos</button>
    </div>

    <!-- Feed -->
    <main id="feed" class="max-w-lg mx-auto p-4 space-y-6">
        <p class="text-center text-gray-400 mt-10 animate-bounce">Buscando novos trampos...</p>
    </main>

    <!-- Botão Flutuante -->
    <button onclick="abrirModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold hover:scale-110 transition-transform">+</button>

    <!-- Modal de Cadastro -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Anunciar Serviço</h2>
            
            <div class="space-y-3">
                <input id="titulo" type="text" placeholder="Título (Ex: Logo 3D Metálica)" class="w-full bg-gray-50 border p-3 rounded-xl outline-none focus:border-blue-500">
                
                <select id="nicho" class="w-full bg-gray-50 border p-3 rounded-xl outline-none">
                    <option value="Geral">Selecione o Nicho</option>
                    <option value="Design">Design / Arte</option>
                    <option value="Fotografia">Fotografia / Edição</option>
                    <option value="Obras">Obras / Reformas</option>
                    <option value="Eventos">Eventos / Festas</option>
                    <option value="Outros">Outros</option>
                </select>

                <textarea id="desc" rows="3" placeholder="Descrição dos detalhes..." class="w-full bg-gray-50 border p-3 rounded-xl outline-none focus:border-blue-500"></textarea>
                
                <input id="fotoUrl" type="text" placeholder="Link da Foto (URL do Google ou Insta)" class="w-full bg-gray-50 border p-3 rounded-xl outline-none">
                
                <div class="flex gap-2">
                    <input id="preco" type="text" placeholder="Preço R$" class="w-1/2 bg-gray-50 border p-3 rounded-xl outline-none">
                    <input id="autor" type="text" placeholder="Seu Nome" class="w-1/2 bg-gray-50 border p-3 rounded-xl outline-none">
                </div>

                <button id="btnPostar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg mt-2 shadow-lg active:scale-95 transition-all">Publicar Agora</button>
                <button onclick="abrirModal()" class="w-full text-gray-400 text-sm mt-2">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // SUA CONFIGURAÇÃO (Mantive a mesma)
        const firebaseConfig = {
            apiKey: "AIzaSyBbYQMbJyOYKhpDyGZ8Bmt0AE1jgKBzDG8",
            authDomain: "instatrampo-3213f.firebaseapp.com",
            projectId: "instatrampo-3213f",
            storageBucket: "instatrampo-3213f.firebasestorage.app",
            messagingSenderId: "705281461211",
            appId: "1:705281461211:web:4cda7e7ad3398b237375fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Abrir/Fechar Modal
        window.abrirModal = () => document.getElementById('modal').classList.toggle('hidden');

        // PUBLICAR
        document.getElementById('btnPostar').onclick = async () => {
            try {
                await addDoc(collection(db, "servicos"), {
                    titulo: document.getElementById('titulo').value,
                    nicho: document.getElementById('nicho').value,
                    descricao: document.getElementById('desc').value,
                    foto: document.getElementById('fotoUrl').value, // Link da imagem
                    preco: document.getElementById('preco').value,
                    autor: document.getElementById('autor').value,
                    data: serverTimestamp()
                });
                abrirModal();
                alert("Postado com sucesso!");
            } catch (e) { alert("Erro ao salvar no banco!"); }
        };

        // LER FEED
        const q = query(collection(db, "servicos"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const s = doc.data();
                const fotoHtml = s.foto ? `<img src="${s.foto}" class="w-full h-48 object-cover rounded-2xl mb-3 shadow-inner">` : '';
                
                feed.innerHTML += `
                    <div class="bg-white rounded-[32px] p-5 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                        ${fotoHtml}
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded-lg uppercase">${s.nicho}</span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800">${s.titulo}</h3>
                        <p class="text-gray-500 text-sm mt-2 line-clamp-2">${s.descricao}</p>
                        <div class="mt-4 flex justify-between items-center border-t pt-4">
                            <div>
                                <p class="text-[10px] text-gray-400 uppercase">Preço Estimado</p>
                                <p class="text-green-600 font-black">R$ ${s.preco}</p>
                            </div>
                            <button class="bg-gray-900 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg">Interesse</button>
                        </div>
                        <p class="text-[9px] text-gray-300 mt-3 italic text-right">Profissional: ${s.autor}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
