<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instatrampo | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; }
        .insta-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50 h-14 flex items-center justify-between px-4">
        <h1 class="text-2xl font-serif italic font-bold tracking-tighter">Instatrampo</h1>
        <svg onclick="abrirModal()" class="w-7 h-7 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    </header>

    <!-- Feed -->
    <main id="feed" class="max-w-lg mx-auto">
        <div class="p-10 text-center text-gray-400">Carregando feed profissional...</div>
    </main>

    <!-- Modal Novo Post -->
    <div id="modal" class="hidden fixed inset-0 bg-white z-[100] flex flex-col overflow-y-auto">
        <div class="h-14 border-b flex items-center justify-between px-4 shrink-0">
            <button onclick="abrirModal()" class="text-gray-500">Cancelar</button>
            <span class="font-bold">Novo Trampo</span>
            <button id="btnPostar" class="text-blue-500 font-bold">Publicar</button>
        </div>

        <div class="p-6 space-y-6">
            <!-- Upload de Imagem -->
            <div id="area-upload" class="w-full aspect-square bg-gray-100 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" id="inputFoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <div id="preview-msg" class="text-center p-4">
                    <p class="text-3xl mb-2 text-gray-400">📸</p>
                    <p class="text-xs font-bold text-gray-400 uppercase">Clique para escolher foto da galeria</p>
                </div>
                <img id="preview-img" class="hidden w-full h-full object-cover">
            </div>

            <div class="space-y-4">
                <input id="titulo" type="text" placeholder="Título (Ex: Logo 3D Metálica)" class="w-full border-b py-2 outline-none">
                <textarea id="desc" placeholder="Legenda/Descrição..." class="w-full border-b py-2 outline-none h-20 resize-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="preco" type="text" placeholder="Preço (R$)" class="border-b py-2 outline-none">
                    <input id="whatsapp" type="number" placeholder="WhatsApp (DDD)" class="border-b py-2 outline-none">
                </div>
                <div class="flex gap-4">
                    <input id="autor" type="text" placeholder="Seu Nome" class="w-1/2 border-b py-2 outline-none">
                    <select id="nicho" class="w-1/2 border-b py-2 outline-none bg-white">
                        <option value="Serviços">Nicho</option>
                        <option value="Design">Design</option>
                        <option value="Fotografia">Fotografia</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // COLOQUE SUA CHAVE DO IMGBB AQUI ABAIXO!
        const IMGBB_API_KEY = "98864ccd6c200976d5cbb63da2770f8f"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBbYQMbJyOYKhpDyGZ8Bmt0AE1jgKBzDG8",
            authDomain: "instatrampo-3213f.firebaseapp.com",
            projectId: "instatrampo-3213f",
            storageBucket: "instatrampo-3213f.firebasestorage.app",
            messagingSenderId: "705281461211",
            appId: "1:705281461211:web:4cda7e7ad3398b237375fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Preview da imagem selecionada
        document.getElementById('inputFoto').onchange = e => {
            const [file] = e.target.files;
            if (file) {
                document.getElementById('preview-img').src = URL.createObjectURL(file);
                document.getElementById('preview-img').classList.remove('hidden');
                document.getElementById('preview-msg').classList.add('hidden');
            }
        };

        window.abrirModal = () => document.getElementById('modal').classList.toggle('hidden');

        document.getElementById('btnPostar').onclick = async () => {
            const btn = document.getElementById('btnPostar');
            const fileInput = document.getElementById('inputFoto');
            
            if (!fileInput.files[0]) return alert("Escolha uma foto!");
            
            btn.innerText = "Subindo...";
            btn.disabled = true;

            try {
                // 1. Upload para o ImgBB
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                const urlFinal = data.data.url;

                // 2. Salvar no Firebase
                await addDoc(collection(db, "servicos"), {
                    titulo: document.getElementById('titulo').value,
                    nicho: document.getElementById('nicho').value,
                    descricao: document.getElementById('desc').value,
                    foto: urlFinal,
                    preco: document.getElementById('preco').value,
                    autor: document.getElementById('autor').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    data: serverTimestamp()
                });

                location.reload(); // Recarrega para limpar tudo
            } catch (e) { 
                alert("Erro ao publicar!"); 
                btn.disabled = false;
            }
        };

        // Renderização do Feed (Igual ao anterior)
        const q = query(collection(db, "servicos"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const s = doc.data();
                const zapLink = `https://api.whatsapp.com/send?phone=55${s.whatsapp}&text=Olá%20${s.autor},%20vi%20seu%20anúncio%20no%20Instatrampo!`;
                
                feed.innerHTML += `
                    <article class="bg-white mb-4 border-b">
                        <div class="flex items-center p-3 gap-2">
                            <div class="w-8 h-8 rounded-full bg-gray-200 border"></div>
                            <span class="font-bold text-xs">${s.autor}</span>
                            <span class="text-[10px] text-gray-400 ml-auto">${s.nicho}</span>
                        </div>
                        <img src="${s.foto}" class="w-full aspect-square object-cover">
                        <div class="p-3">
                            <p class="text-sm"><span class="font-bold mr-2">${s.autor}</span>${s.titulo}</p>
                            <p class="text-gray-500 text-xs mt-1">${s.descricao}</p>
                            <div class="mt-4 flex justify-between items-center bg-gray-50 p-3 rounded-lg">
                                <span class="font-bold text-green-600 italic">R$ ${s.preco}</span>
                                <a href="${zapLink}" target="_blank" class="bg-black text-white px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest">Combinar</a>
                            </div>
                        </div>
                    </article>
                `;
            });
        });
    </script>
</body>
</html>
