<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instatrampo | Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .heart-pop { animation: pulse 0.3s ease-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50 h-14 flex items-center justify-between px-4">
        <h1 class="text-2xl font-serif italic font-bold tracking-tighter">Instatrampo</h1>
        <svg onclick="abrirModal()" class="w-7 h-7 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    </header>

    <!-- Feed -->
    <main id="feed" class="max-w-lg mx-auto">
        <div class="p-10 text-center text-gray-400">Carregando interações...</div>
    </main>

    <!-- Menu Inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t h-14 flex justify-around items-center z-50">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.099l7 4.508v13.303l-7-4.508-7 4.508v-13.303l7-4.508zm0-2.099l-9 5.8v16.2l9-5.8 9 5.8v-16.2l-9-5.8z"/></svg>
        <div onclick="abrirModal()" class="w-9 h-9 bg-black rounded-xl flex items-center justify-center text-white font-bold cursor-pointer text-xl">+</div>
        <div class="w-7 h-7 bg-gray-300 rounded-full border border-gray-400"></div>
    </nav>

    <!-- Modal Novo Post -->
    <div id="modal" class="hidden fixed inset-0 bg-white z-[100] flex flex-col overflow-y-auto">
        <div class="h-14 border-b flex items-center justify-between px-4 shrink-0">
            <button onclick="abrirModal()" class="text-gray-500">Cancelar</button>
            <span class="font-bold">Novo Trampo</span>
            <button id="btnPostar" class="text-blue-500 font-bold">Publicar</button>
        </div>

        <div class="p-6 space-y-6">
            <div id="area-upload" class="w-full aspect-square bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" id="inputFoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <div id="preview-msg" class="text-center p-4">
                    <p class="text-4xl mb-2">📸</p>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">Toque para escolher foto</p>
                </div>
                <img id="preview-img" class="hidden w-full h-full object-cover">
            </div>

            <div class="space-y-4">
                <input id="titulo" type="text" placeholder="O que você faz?" class="w-full border-b py-2 outline-none">
                <textarea id="desc" placeholder="Legenda..." class="w-full border-b py-2 outline-none h-16 resize-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="preco" type="text" placeholder="Preço R$" class="border-b py-2 outline-none">
                    <input id="whatsapp" type="number" placeholder="WhatsApp" class="border-b py-2 outline-none">
                </div>
                <div class="flex gap-4">
                    <input id="autor" type="text" placeholder="Seu Nome" class="w-1/2 border-b py-2 outline-none">
                    <select id="nicho" class="w-1/2 border-b py-2 outline-none bg-white font-bold text-xs uppercase">
                        <option value="Geral">Categoria</option>
                        <option value="Design">Design</option>
                        <option value="Fotografia">Fotografia</option>
                        <option value="Obras">Obras</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === 98864ccd6c200976d5cbb63da2770f8f ===
        const IMGBB_API_KEY = "SUA_CHAVE_AQUI"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBbYQMbJyOYKhpDyGZ8Bmt0AE1jgKBzDG8",
            authDomain: "instatrampo-3213f.firebaseapp.com",
            projectId: "instatrampo-3213f",
            storageBucket: "instatrampo-3213f.firebasestorage.app",
            messagingSenderId: "705281461211",
            appId: "1:705281461211:web:4cda7e7ad3398b237375fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Preview da foto
        document.getElementById('inputFoto').onchange = e => {
            const [file] = e.target.files;
            if (file) {
                document.getElementById('preview-img').src = URL.createObjectURL(file);
                document.getElementById('preview-img').classList.remove('hidden');
                document.getElementById('preview-msg').classList.add('hidden');
            }
        };

        window.abrirModal = () => document.getElementById('modal').classList.toggle('hidden');

        // Função de Curtir
        window.curtir = async (id) => {
            const postRef = doc(db, "servicos", id);
            await updateDoc(postRef, {
                curtidas: increment(1)
            });
        };

        // Postar
        document.getElementById('btnPostar').onclick = async () => {
            const btn = document.getElementById('btnPostar');
            const fileInput = document.getElementById('inputFoto');
            if (!fileInput.files[0]) return alert("Escolha uma foto!");
            
            btn.innerText = "...";
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const imgData = await resp.json();

                await addDoc(collection(db, "servicos"), {
                    titulo: document.getElementById('titulo').value,
                    nicho: document.getElementById('nicho').value,
                    descricao: document.getElementById('desc').value,
                    foto: imgData.data.url,
                    preco: document.getElementById('preco').value,
                    autor: document.getElementById('autor').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    curtidas: 0,
                    data: serverTimestamp()
                });
                location.reload();
            } catch (e) { alert("Erro!"); btn.disabled = false; }
        };

        // Render Feed
        const q = query(collection(db, "servicos"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((postDoc) => {
                const s = postDoc.data();
                const id = postDoc.id;
                const zapLink = `https://api.whatsapp.com/send?phone=55${s.whatsapp}&text=Olá%20${s.autor},%20vi%20seu%20anúncio%20no%20Instatrampo!`;
                
                feed.innerHTML += `
                    <article class="bg-white mb-2 border-b">
                        <div class="flex items-center p-3 gap-2">
                            <div class="w-8 h-8 rounded-full bg-gray-200 border"></div>
                            <span class="font-bold text-xs">${s.autor}</span>
                        </div>
                        
                        <img src="${s.foto}" class="w-full aspect-square object-cover" ondblclick="curtir('${id}')">
                        
                        <div class="p-3">
                            <div class="flex gap-4 mb-2">
                                <button onclick="curtir('${id}')" class="focus:text-red-500 active:scale-125 transition-transform">
                                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                                </button>
                                <a href="${zapLink}" target="_blank">
                                    <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                                </a>
                            </div>
                            
                            <p class="font-bold text-sm mb-1">${s.curtidas || 0} curtidas</p>
                            <p class="text-sm"><span class="font-bold mr-2">${s.autor}</span>${s.titulo}</p>
                            <p class="text-gray-500 text-xs mt-1 mb-4">${s.descricao}</p>
                            
                            <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <span class="font-bold text-green-600 text-sm">R$ ${s.preco}</span>
                                <a href="${zapLink}" target="_blank" class="bg-black text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest">Combinar</a>
                            </div>
                        </div>
                    </article>
                `;
            });
        });
    </script>
</body>
</html>
