<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instatrampo | Sua Rede de Serviços</title>
    <!-- Tailwind CSS para um visual moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .feed-gradient { background: linear-gradient(180deg, #f3f4f6 0%, #ffffff 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <!-- Header Estilo Rede Social -->
    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-blue-600 tracking-tight">Instatrampo</h1>
            <div class="flex space-x-2">
                <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Online</span>
            </div>
        </div>
    </header>

    <!-- Filtros Rápidos -->
    <div class="max-w-lg mx-auto p-4 flex gap-2 overflow-x-auto no-scrollbar">
        <button class="bg-blue-600 text-white px-4 py-1 rounded-full text-sm shadow-md">Todos</button>
        <button class="bg-white border border-gray-300 px-4 py-1 rounded-full text-sm text-gray-600">Design</button>
        <button class="bg-white border border-gray-300 px-4 py-1 rounded-full text-sm text-gray-600">Reparos</button>
        <button class="bg-white border border-gray-300 px-4 py-1 rounded-full text-sm text-gray-600">Aulas</button>
    </div>

    <!-- Feed de Serviços -->
    <main id="feed" class="max-w-lg mx-auto p-4 space-y-4">
        <div class="text-center py-10">
            <p class="text-gray-400 animate-pulse">Carregando oportunidades...</p>
        </div>
    </main>

    <!-- Botão Flutuante para Novo Post -->
    <button onclick="document.getElementById('modal').classList.remove('hidden')" 
            class="fixed bottom-6 right-6 bg-blue-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-3xl hover:bg-blue-700 transition-all transform hover:scale-110">
        +
    </button>

    <!-- Modal de Cadastro (Postar Serviço) -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Novo Post</h2>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Título do Serviço</label>
                    <input id="titulo" type="text" placeholder="Ex: Edição de Vídeo" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Categoria (Nicho)</label>
                    <input id="nicho" type="text" placeholder="Ex: Audiovisual" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">O que precisa ser feito?</label>
                    <textarea id="desc" rows="3" placeholder="Descreva os detalhes..." class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase ml-1">Preço (R$)</label>
                        <input id="preco" type="number" placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase ml-1">Seu Nome</label>
                        <input id="autor" type="text" placeholder="Nome" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <button id="btnPostar" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all mt-4">Publicar no Feed</button>
            </div>
        </div>
    </div>

    <!-- Script de Integração com Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuração que você me mandou
        const firebaseConfig = {
            apiKey: "AIzaSyBbYQMbJyOYKhpDyGZ8Bmt0AE1jgKBzDG8",
            authDomain: "instatrampo-3213f.firebaseapp.com",
            projectId: "instatrampo-3213f",
            storageBucket: "instatrampo-3213f.firebasestorage.app",
            messagingSenderId: "705281461211",
            appId: "1:705281461211:web:4cda7e7ad3398b237375fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO PARA PUBLICAR
        document.getElementById('btnPostar').onclick = async () => {
            const btn = document.getElementById('btnPostar');
            btn.innerText = "Postando...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "servicos"), {
                    titulo: document.getElementById('titulo').value,
                    nicho: document.getElementById('nicho').value,
                    descricao: document.getElementById('desc').value,
                    preco: document.getElementById('preco').value,
                    autor: document.getElementById('autor').value,
                    data: serverTimestamp()
                });
                
                // Limpar e fechar
                document.getElementById('modal').classList.add('hidden');
                document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            } catch (e) {
                alert("Erro ao postar. Verifique o Modo de Teste do Firestore.");
            } finally {
                btn.innerText = "Publicar no Feed";
                btn.disabled = false;
            }
        };

        // FUNÇÃO PARA LER O FEED EM TEMPO REAL
        const q = query(collection(db, "servicos"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            if (snapshot.empty) {
                feed.innerHTML = `<div class="text-center py-20 text-gray-400">Nenhum serviço postado ainda. Seja o primeiro!</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const s = doc.data();
                feed.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden transition-all hover:shadow-md">
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-0.5 rounded-md uppercase tracking-wider">${s.nicho || 'Geral'}</span>
                                <span class="text-gray-400 text-[10px]">agora mesmo</span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${s.titulo}</h3>
                            <p class="text-gray-500 text-sm mt-2 line-clamp-3">${s.descricao}</p>
                            
                            <div class="mt-4 pt-4 border-t border-gray-50 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] text-gray-400 uppercase font-bold">Orçamento</p>
                                    <p class="text-lg font-black text-green-600 text-sm">R$ ${s.preco}</p>
                                </div>
                                <button class="bg-gray-900 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-blue-600 transition-colors">Tenho Interesse</button>
                            </div>
                            <p class="text-[10px] text-gray-400 mt-3 italic">Postado por: ${s.autor || 'Anônimo'}</p>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
