<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instatrampo | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .insta-shadow { box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-20">

    <!-- Header Estilo Instagram -->
    <header class="bg-white border-b sticky top-0 z-50 h-14 flex items-center">
        <div class="max-w-lg mx-auto w-full px-4 flex justify-between items-center">
            <h1 class="text-2xl font-serif italic font-bold tracking-tighter">Instatrampo</h1>
            <div class="flex gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
                <svg onclick="abrirModal()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 cursor-pointer">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Stories / Nichos -->
    <div class="max-w-lg mx-auto py-4 px-2 flex gap-4 overflow-x-auto no-scrollbar bg-white border-b">
        <div class="flex flex-col items-center gap-1 shrink-0">
            <div class="w-16 h-16 rounded-full border-2 border-pink-500 p-0.5"><div class="w-full h-full bg-gray-200 rounded-full border border-white"></div></div>
            <span class="text-[10px]">Todos</span>
        </div>
        <div class="flex flex-col items-center gap-1 shrink-0 text-gray-400">
            <div class="w-16 h-16 rounded-full border border-gray-200 p-0.5"><div class="w-full h-full bg-blue-100 rounded-full flex items-center justify-center">🎨</div></div>
            <span class="text-[10px]">Design</span>
        </div>
        <div class="flex flex-col items-center gap-1 shrink-0 text-gray-400">
            <div class="w-16 h-16 rounded-full border border-gray-200 p-0.5"><div class="w-full h-full bg-purple-100 rounded-full flex items-center justify-center">📸</div></div>
            <span class="text-[10px]">Fotos</span>
        </div>
        <div class="flex flex-col items-center gap-1 shrink-0 text-gray-400">
            <div class="w-16 h-16 rounded-full border border-gray-200 p-0.5"><div class="w-full h-full bg-green-100 rounded-full flex items-center justify-center">🛠️</div></div>
            <span class="text-[10px]">Reparos</span>
        </div>
    </div>

    <!-- Feed Principal -->
    <main id="feed" class="max-w-lg mx-auto pb-10">
        <!-- Posts entrarão aqui via JS -->
    </main>

    <!-- Menu Inferior Fixo -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t h-12 flex justify-around items-center z-50">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.099l7 4.508v13.303l-7-4.508-7 4.508v-13.303l7-4.508zm0-2.099l-9 5.8v16.2l9-5.8 9 5.8v-16.2l-9-5.8z"/></svg>
        <svg onclick="abrirModal()" class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <div class="w-6 h-6 bg-gray-300 rounded-full"></div>
    </nav>

    <!-- Modal Novo Post -->
    <div id="modal" class="hidden fixed inset-0 bg-white z-[100] flex flex-col">
        <div class="h-14 border-b flex items-center justify-between px-4">
            <button onclick="abrirModal()" class="text-blue-500">Cancelar</button>
            <span class="font-bold">Nova Publicação</span>
            <button id="btnPostar" class="text-blue-500 font-bold">Compartilhar</button>
        </div>
        <div class="p-4 space-y-4">
            <div class="flex gap-4">
                <div class="w-12 h-12 bg-gray-200 rounded"></div>
                <textarea id="desc" placeholder="Escreva uma legenda..." class="flex-1 outline-none resize-none pt-2 h-24"></textarea>
            </div>
            <input id="titulo" type="text" placeholder="Título do Serviço" class="w-full border-b py-2 outline-none">
            <input id="fotoUrl" type="text" placeholder="URL da Imagem (Portfólio)" class="w-full border-b py-2 outline-none">
            <div class="flex gap-4">
                <input id="preco" type="text" placeholder="Preço R$" class="border-b py-2 outline-none w-1/2">
                <select id="nicho" class="border-b py-2 outline-none w-1/2 bg-white">
                    <option value="Geral">Nicho</option>
                    <option value="Design">Design</option>
                    <option value="Fotografia">Fotografia</option>
                    <option value="Obras">Obras</option>
                </select>
            </div>
            <input id="autor" type="text" placeholder="Seu Nome Profissional" class="w-full border-b py-2 outline-none">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbYQMbJyOYKhpDyGZ8Bmt0AE1jgKBzDG8",
            authDomain: "instatrampo-3213f.firebaseapp.com",
            projectId: "instatrampo-3213f",
            storageBucket: "instatrampo-3213f.firebasestorage.app",
            messagingSenderId: "705281461211",
            appId: "1:705281461211:web:4cda7e7ad3398b237375fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.abrirModal = () => document.getElementById('modal').classList.toggle('hidden');

        document.getElementById('btnPostar').onclick = async () => {
            const btn = document.getElementById('btnPostar');
            btn.innerText = "Postando...";
            try {
                await addDoc(collection(db, "servicos"), {
                    titulo: document.getElementById('titulo').value,
                    nicho: document.getElementById('nicho').value,
                    descricao: document.getElementById('desc').value,
                    foto: document.getElementById('fotoUrl').value,
                    preco: document.getElementById('preco').value,
                    autor: document.getElementById('autor').value,
                    data: serverTimestamp()
                });
                abrirModal();
            } catch (e) { alert("Erro!"); }
            btn.innerText = "Compartilhar";
        };

        const q = query(collection(db, "servicos"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const s = doc.data();
                const fotoHtml = s.foto ? `<img src="${s.foto}" class="w-full aspect-square object-cover bg-gray-100">` : '<div class="w-full aspect-square bg-gray-100 flex items-center justify-center">Sem Foto</div>';
                
                feed.innerHTML += `
                    <article class="bg-white border-b mb-2">
                        <div class="flex items-center p-3 gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-400 to-purple-600 p-0.5">
                                <div class="w-full h-full bg-gray-300 rounded-full border border-white"></div>
                            </div>
                            <span class="text-sm font-bold text-gray-800">${s.autor || 'Profissional'}</span>
                            <span class="text-xs text-blue-500 ml-auto font-bold">${s.nicho}</span>
                        </div>
                        
                        ${fotoHtml}
                        
                        <div class="p-3">
                            <div class="flex gap-4 mb-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                            </div>
                            <p class="text-sm"><span class="font-bold mr-2">${s.titulo}</span>${s.descricao}</p>
                            <div class="mt-3 bg-gray-50 p-2 rounded flex justify-between items-center">
                                <span class="text-green-600 font-bold text-sm">Orçamento: R$ ${s.preco}</span>
                                <button class="text-blue-500 font-bold text-xs">Contratar</button>
                            </div>
                        </div>
                    </article>
                `;
            });
        });
    </script>
</body>
</html>
